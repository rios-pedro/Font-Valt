spring:
  application:
    name: font-vault
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

supabase:
  storage:
    url: ${SUPABASE_STORAGE_URL}
    bucket: font-vault
    service-key: ${SUPABASE_SERVICE_KEY}

springdoc:
  swagger-ui:
    path: /swagger-ui.html